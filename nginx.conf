server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

    # Service worker e index.html: nunca cachear (para que la PWA reciba updates)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets versionados por hash: cache largo e inmutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: toda ruta no-archivo cae en index.html (routing client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
